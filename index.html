<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Социальные связи MM18 — интерактивный граф участников</title>
  <meta name="description" content="Карта связей участников 18 потока мастермайнда Шамалова: кто с кем, кто чем может помочь, к кому стоит подойти на выезде.">
  <meta name="theme-color" content="#050510">
  <meta name="robots" content="noindex,nofollow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Социальные связи MM18">
  <meta property="og:description" content="Интерактивная карта 100 участников мастермайнда: связи, темы, рекомендации.">
  <meta property="og:url" content="https://ytimarketing.github.io/mm18-social-graph/">
  <meta property="og:locale" content="ru_RU">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Социальные связи MM18">
  <meta name="twitter:description" content="Интерактивная карта 100 участников мастермайнда: связи, темы, рекомендации.">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Splash -->
  <div id="splash" class="splash" role="dialog" aria-modal="true" aria-labelledby="splash-title">
    <div class="splash-card">
      <div class="splash-tag">MM18</div>
      <h1 id="splash-title">Социальные <span class="accent">связи</span> чата<br>MM18</h1>
      <p>Введи имя или @username, чтобы сразу открыть свои связи.</p>
      <label for="splash-input" class="visually-hidden">Твоё имя или @username</label>
      <input id="splash-input" type="text" placeholder="Имя или @username" autocomplete="off">
      <div id="splash-suggest" class="splash-suggest hidden" role="listbox" aria-label="Похожие участники"></div>
      <button id="splash-enter">Войти</button>
      <button id="splash-skip" class="link">Пропустить</button>
    </div>
  </div>

  <!-- Header -->
  <header id="header" class="hidden">
    <div class="header-left">
      <span class="accent">Социальные связи</span>
      <span class="muted">чата MM18</span>
    </div>
    <div class="header-center">
      <label for="search" class="visually-hidden">Поиск участников</label>
      <input id="search" type="text" placeholder="Имя или @telegram…" autocomplete="off" aria-controls="search-suggest">
      <div id="search-suggest" class="search-suggest hidden" role="listbox" aria-label="Результаты поиска"></div>
    </div>
    <div class="header-right" role="toolbar" aria-label="Фильтры и инструменты">
      <button class="filter-btn active" data-filter="all" aria-pressed="true">Все связи</button>
      <button class="filter-btn" data-filter="mine" aria-pressed="false">Мои связи</button>
      <button class="filter-btn" id="city-btn" aria-haspopup="dialog">Город</button>
      <button class="filter-btn" id="categories-btn" aria-haspopup="dialog">Категории</button>
      <button class="filter-btn" id="rating-btn" aria-haspopup="dialog">Рейтинг</button>
      <button class="filter-btn ghost hidden" id="switch-self-btn" title="Сменить «Я»" aria-label="Сменить «Я» — войти как другой участник">⇄</button>
      <span class="counter" id="counter-participants">— участников</span>
      <span class="counter" id="counter-links">— связей</span>
    </div>
  </header>

  <!-- Cosmic background canvas (звёзды + туманности) -->
  <canvas id="stars" aria-hidden="true"></canvas>

  <!-- Graph canvas -->
  <main id="graph" class="hidden" role="img" aria-label="Граф социальных связей участников MM18"></main>

  <!-- Legend -->
  <aside id="legend" class="hidden" aria-label="Легенда: цвета ролей">
    <span class="legend-dot" style="background:#a155b9" aria-hidden="true"></span> Организатор
    <span class="legend-dot" style="background:#00c853" aria-hidden="true"></span> Ментор
    <span class="legend-dot" style="background:#4a90d9" aria-hidden="true"></span> Участник
    <span class="legend-dot" style="background:#ff6b00" aria-hidden="true"></span> Ты
  </aside>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar hidden" aria-label="Панель деталей">
    <div class="sidebar-header">
      <span>ПРОФИЛЬ</span>
      <button id="sidebar-close" aria-label="Закрыть панель">×</button>
    </div>
    <div id="sidebar-body"></div>
  </aside>

  <script
    src="https://cdn.jsdelivr.net/npm/force-graph@1.51.4"
    integrity="sha384-Hm6GpQcTNI5VqGgGS7lLxTGtEFcxu/kOVV0B7ozIZRu9blWVvigv5httJQZ2qZmY"
    crossorigin="anonymous"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
