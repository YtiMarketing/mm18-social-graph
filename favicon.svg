<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1335"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffae42" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffae42" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- три фоновые ноды -->
  <circle cx="16" cy="20" r="3" fill="#6aa9ff" opacity="0.85"/>
  <circle cx="48" cy="18" r="2.5" fill="#c87dff" opacity="0.85"/>
  <circle cx="14" cy="46" r="2.5" fill="#3fd5a0" opacity="0.85"/>
  <circle cx="50" cy="48" r="2.5" fill="#6aa9ff" opacity="0.85"/>
  <!-- линки к self -->
  <line x1="16" y1="20" x2="32" y2="32" stroke="#ffae42" stroke-opacity="0.45" stroke-width="1.2"/>
  <line x1="48" y1="18" x2="32" y2="32" stroke="#ffae42" stroke-opacity="0.45" stroke-width="1.2"/>
  <line x1="14" y1="46" x2="32" y2="32" stroke="#ffae42" stroke-opacity="0.45" stroke-width="1.2"/>
  <line x1="50" y1="48" x2="32" y2="32" stroke="#ffae42" stroke-opacity="0.45" stroke-width="1.2"/>
  <!-- self node с halo -->
  <circle cx="32" cy="32" r="16" fill="url(#halo)"/>
  <circle cx="32" cy="32" r="8" fill="#ffae42" stroke="#fff" stroke-opacity="0.4" stroke-width="0.8"/>
</svg>
